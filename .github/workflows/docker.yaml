name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "production"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force image rebuild even if upstream is unchanged"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_DOCKERHUB_REPO: chocobozzz/peertube
  UPSTREAM_DOCKERHUB_TAG: production

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Resolve upstream Docker Hub tag digest
        id: upstream
        run: |
          set -euo pipefail
          endpoint="https://hub.docker.com/v2/repositories/${UPSTREAM_DOCKERHUB_REPO}/tags/${UPSTREAM_DOCKERHUB_TAG}"
          digest="$(curl -fsSL "$endpoint" | jq -r '.digest // empty')"
          if [ -z "$digest" ]; then
            echo "Failed to resolve digest for ${UPSTREAM_DOCKERHUB_REPO}:${UPSTREAM_DOCKERHUB_TAG}" >&2
            exit 1
          fi
          echo "Upstream digest: $digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Compute build input fingerprint
        id: fingerprint
        run: |
          set -euo pipefail
          {
            printf 'upstream=%s\n' "${{ steps.upstream.outputs.digest }}"
            sha256sum Dockerfile start-with-plugin.sh
          } | sha256sum | awk '{print "fingerprint="$1}' >> "$GITHUB_OUTPUT"

      - name: Create build input marker file
        run: echo "${{ steps.fingerprint.outputs.fingerprint }}" > .build-inputs-marker

      - name: Restore build input cache marker
        id: build_inputs_cache
        uses: actions/cache@v4
        with:
          path: .build-inputs-marker
          key: build-inputs-${{ steps.fingerprint.outputs.fingerprint }}

      - name: Skip unchanged image build
        if: steps.build_inputs_cache.outputs.cache-hit == 'true' && !inputs.force_rebuild
        run: echo "Skipping image build because the upstream base image and local build inputs are unchanged."

      - name: Set up QEMU
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production

      - name: Build and push Docker image
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          provenance: mode=max
          sbom: true

      - name: Generate build attestation (GHCR)
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate build attestation (Docker Hub)
        if: steps.build_inputs_cache.outputs.cache-hit != 'true' || inputs.force_rebuild
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
